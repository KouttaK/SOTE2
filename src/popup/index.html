<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOTE</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>

    <!-- ── Popup card ────────────────────────────────────────────────────── -->
    <div id="popup-card">

      <!-- ── Header ────────────────────────────────────────────────────── -->
      <div id="popup-header">
        <!-- Logo -->
        <div class="popup-logo-group">
          <div class="popup-logo-icon">
            <span>S</span>
          </div>
          <span class="popup-wordmark">SOTE</span>
          <span class="popup-version-badge">v2.4</span>
        </div>

        <!-- Master toggle -->
        <div class="popup-toggle-row">
          <span class="popup-toggle-label" id="toggle-label">Enabled</span>
          <div id="toggle-track" class="popup-toggle-track is-on" role="switch" aria-checked="true" tabindex="0">
            <div class="popup-toggle-knob"></div>
          </div>
        </div>
      </div>

      <!-- ── Body ──────────────────────────────────────────────────────── -->
      <div id="popup-body">

        <!-- Quick Pause section -->
        <div id="popup-quick-pause">
          <p class="popup-section-label">Quick Pause</p>

          <!-- Normal state: 3-button grid -->
          <div id="pause-grid" class="pause-grid">
            <button id="btn-snooze-1h" class="pause-btn" type="button">
              <!-- fa-clock outline -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" aria-hidden="true" fill="currentColor">
                <path d="M464 256A208 208 0 1 1 48 256a208 208 0 1 1 416 0zM0 256a256 256 0 1 0 512 0A256 256 0 1 0 0 256zM232 120V256c0 8 4 15.5 10.7 20l96 64c11 7.4 25.9 4.4 33.3-6.7s4.4-25.9-6.7-33.3L280 243.2V120c0-13.3-10.7-24-24-24s-24 10.7-24 24z"/>
              </svg>
              <span>Snooze 1 Hour</span>
            </button>

            <button id="btn-snooze-4h" class="pause-btn" type="button">
              <!-- fa-bell-slash outline -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512" aria-hidden="true" fill="currentColor">
                <path d="M38.8 5.1C28.4-3.1 13.3-1.2 5.1 9.2S-1.2 34.7 9.2 42.9l592 464c10.4 8.2 25.5 6.3 33.7-4.1s6.3-25.5-4.1-33.7L542.6 400c2.7-7.8 1.3-16.5-3.9-23l-14.9-18.6C495.5 322.9 480 278.8 480 233.4V200c0-75.8-55.5-138.6-128-150.1V32c0-17.7-14.3-32-32-32s-32 14.3-32 32V49.9c-43.9 7-81.5 32.7-104.4 68.7L38.8 5.1zM221.7 148.4C239.6 117.1 273.3 96 312 96h8 8c57.4 0 104 46.6 104 104v33.4c0 32.7 6.4 64.8 18.7 94.5L221.7 148.4zM406.2 416l-60.9-48H168.3c21.2-32.8 34.4-70.3 38.4-109.1L160 222.1v11.4c0 45.4-15.5 89.5-43.8 124.9L101.3 377c-5.8 7.2-6.9 17.1-2.9 25.4s12.4 13.6 21.6 13.6H406.2zM384 448H320 256c0 17 6.7 33.3 18.7 45.3s28.3 18.7 45.3 18.7s33.3-6.7 45.3-18.7s18.7-28.3 18.7-45.3z"/>
              </svg>
              <span>Snooze 4 Hours</span>
            </button>

            <button id="btn-block-site" class="pause-btn" type="button">
              <!-- fa-eye-slash outline -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512" aria-hidden="true" fill="currentColor">
                <path d="M38.8 5.1C28.4-3.1 13.3-1.2 5.1 9.2S-1.2 34.7 9.2 42.9l592 464c10.4 8.2 25.5 6.3 33.7-4.1s6.3-25.5-4.1-33.7L525.6 386.7c39.6-40.6 66.4-86.1 79.9-118.4c3.3-7.9 3.3-16.7 0-24.6c-14.9-35.7-46.2-87.7-93-131.1C465.5 68.8 400.8 32 320 32c-68.2 0-125 26.3-169.3 60.8L38.8 5.1zm151 118.3C226 97.7 269.5 80 320 80c65.2 0 118.8 29.6 159.9 67.7C518.4 183.5 545 226 558.6 256c-12.6 28-36.6 66.8-70.9 100.9l-53.8-42.2c9.1-17.6 14.2-37.5 14.2-58.7c0-70.7-57.3-128-128-128c-32.2 0-61.7 11.9-84.2 31.5l-46.1-36.1zM394.9 284.2l-81.5-63.9c4.2-8.5 6.6-18.2 6.6-28.3c0-5.5-.7-10.9-2-16c.7 0 1.3 0 2 0c44.2 0 80 35.8 80 80c0 9.9-1.8 19.4-5.1 28.2zm9.4 130.3C378.8 425.4 350.7 432 320 432c-65.2 0-118.8-29.6-159.9-67.7C121.6 328.5 95 286 81.4 256c8.3-18.4 21.5-41.5 39.4-64.8L83.1 161.5C60.3 191.2 44 220.8 34.5 243.7c-3.3 7.9-3.3 16.7 0 24.6c14.9 35.7 46.2 87.7 93 131.1C174.5 443.2 239.2 480 320 480c47.8 0 89.9-12.9 126.2-32.5l-41.9-33zM192 256c0 70.7 57.3 128 128 128c13.3 0 26.1-2 38.2-5.8L302 334c-23.5-5.4-43.1-21.2-53.7-42.3l-56.1-44.2c-.2 2.8-.3 5.6-.3 8.5z"/>
              </svg>
              <span id="block-btn-label">Mute on Site</span>
            </button>
          </div>

          <!-- Snooze active banner (hidden by default) -->
          <div id="popup-snooze-banner">
            <div class="snooze-info-row">
              <span class="snooze-info-text" id="snooze-remaining-text">Paused</span>
            </div>
            <button id="btn-cancel-snooze" class="snooze-cancel-btn" type="button">
              <span>Cancel pause</span>
            </button>
          </div>
        </div>

        <!-- Search bar -->
        <div id="popup-search">
          <div class="search-wrap">
            <!-- fa-magnifying-glass -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" aria-hidden="true" fill="currentColor">
              <path d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"/>
            </svg>
            <input
              id="search-input"
              type="text"
              placeholder="Search snippets..."
              autocomplete="off"
              spellcheck="false"
            />
            <kbd>⌘K</kbd>
          </div>
        </div>

        <!-- Recent snippets -->
        <div id="popup-recent">
          <p class="popup-section-label">Recent Snippets</p>
          <div id="snippets-list" class="snippets-list">
            <!-- Rendered by index.ts -->
          </div>
        </div>

      </div><!-- /#popup-body -->

      <!-- ── Footer ─────────────────────────────────────────────────────── -->
      <div id="popup-footer">
        <button id="btn-open-dashboard" type="button">
          <span>Open full Dashboard</span>
          <!-- fa-arrow-up-right-from-square -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" aria-hidden="true" fill="currentColor">
            <path d="M320 0c-17.7 0-32 14.3-32 32s14.3 32 32 32h82.7L201.4 265.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L448 109.3V192c0 17.7 14.3 32 32 32s32-14.3 32-32V32c0-17.7-14.3-32-32-32H320zM80 32C35.8 32 0 67.8 0 112V432c0 44.2 35.8 80 80 80H400c44.2 0 80-35.8 80-80V320c0-17.7-14.3-32-32-32s-32 14.3-32 32V432c0 8.8-7.2 16-16 16H80c-8.8 0-16-7.2-16-16V112c0-8.8 7.2-16 16-16H192c17.7 0 32-14.3 32-32s-14.3-32-32-32H80z"/>
          </svg>
        </button>
      </div>

    </div><!-- /#popup-card -->

    <!-- Feedback toast (DOM-level, absolute positioned) -->
    <div id="feedback-toast" class="feedback-toast" aria-live="polite"></div>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
